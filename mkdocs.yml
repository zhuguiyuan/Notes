# Project Information
site_name: AutoTranslator's Magic World
site_url: https://zhuguiyuan.github.io/Notes/

# Repository
repo_name: 'zhuguiyuan/Notes'
repo_url: 'https://github.com/zhuguiyuan/Notes'

theme:
  name: material
  language: zh
  favicon: assets/favicon.png
  palette:
    primary: white
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.indexes
    - navigation.footer

plugins:
  - search
  - blog:
      blog_dir: .
      blog_toc: true

# Contents
nav:
  - 碎片:
    - index.md
  - 关于: about.md

